<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALIENS Settings Workbench</title>
    <link rel="stylesheet" href="/shared/nav.css">
    <style>
        :root {
            --bg: #0a0e14;
            --panel: #101820;
            --panel-2: #0c1420;
            --line: #1a3a52;
            --text: #f0f6ff;
            --muted: #8ea8c0;
            --accent: #4aa4d8;
            --accent-bright: #7ecfff;
            --ok: #33ff66;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: radial-gradient(1000px 520px at 5% -25%, #1a3a5266, transparent 64%), var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        }
        .shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: calc(100vh - 28px);
            margin-top: 28px;
        }
        .sidebar {
            border-right: 1px solid var(--line);
            background: #0c1420;
            padding: 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
        }
        .sidebar h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.02em;
        }
        .sub {
            margin-top: 5px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }
        .tabs {
            margin-top: 14px;
            display: grid;
            gap: 6px;
        }
        .tab-btn {
            text-align: left;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent-bright);
            background: #122a3d;
        }
        .links {
            margin-top: 14px;
            display: grid;
            gap: 4px;
        }
        .links a {
            color: var(--accent-bright);
            text-decoration: none;
            font-size: 12px;
        }
        .main {
            padding: 16px;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
        }
        button, .import-wrap {
            border: 1px solid var(--line);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
        }
        .import-wrap input { margin-left: 7px; }
        .status { color: var(--ok); font-size: 13px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .panel-title {
            margin: 2px 0 10px;
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 10px;
        }
        .card {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 10px;
            padding: 10px;
        }
        .card h2 {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 16px;
        }
        .field {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px;
            margin-bottom: 7px;
            background: var(--panel-2);
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .inputs {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 96px;
            gap: 8px;
            align-items: center;
        }
        input[type="range"] { width: 100%; }
        input[type="number"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 6px;
            padding: 6px;
            font: 13px "IBM Plex Mono", monospace;
        }
        .footer {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
        }
        @media (max-width: 920px) {
            .shell { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
        }
        /* Nav styles loaded from /shared/nav.css */
    </style>
</head>

        function getByPath(obj, path) {
            return path.split('.').reduce((acc, key) => (acc ? acc[key] : undefined), obj);
        }

        function setByPath(obj, path, value) {
            const parts = path.split('.');
            let cur = obj;
            for (let i = 0; i < parts.length - 1; i++) {
                const p = parts[i];
                if (!cur[p] || typeof cur[p] !== 'object') cur[p] = {};
                cur = cur[p];
            }
            cur[parts[parts.length - 1]] = value;
        }

            const value = Number(getByPath(state, path));
            return `
                <div class="field">
                    <label for="${id}_range">${label}</label>
                    <div class="inputs">
                        <input id="${id}_range" data-kind="range" data-path="${path}" type="range" min="${min}" max="${max}" step="${step}" value="${value}">
                        <input id="${id}_number" data-kind="number" data-path="${path}" type="number" min="${min}" max="${max}" step="${step}" value="${value}">
                    </div>
                </div>
            `;
        }

        function renderTabs() {
            tabsRoot.innerHTML = TABS.map((t) => `
                <button class="tab-btn ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>
            `).join('');
        }

        function renderPanels() {
            panelsRoot.innerHTML = TABS.map((tab) => {
                const sections = tab.sections.map((section) => {
                    const fields = section.fields.map((f) => makeField(...f)).join('');
                    return `<section class="card"><h2>${section.title}</h2>${fields}</section>`;
                }).join('');
                return `
                    <section class="panel ${tab.id === activeTab ? 'active' : ''}" id="panel_${tab.id}">
                        <h2 class="panel-title">${tab.label}</h2>
                        <div class="grid">${sections}</div>
                    </section>
                `;
            }).join('');

            const inputs = panelsRoot.querySelectorAll('input[data-path]');
            for (const input of inputs) {
                input.addEventListener('input', () => {
                    const path = input.dataset.path;
                    const val = Number(input.value);
                    setByPath(state, path, val);

                    const pairKind = input.dataset.kind === 'range' ? 'number' : 'range';
                    const peer = panelsRoot.querySelector(`input[data-path="${path}"][data-kind="${pairKind}"]`);
                    if (peer) peer.value = String(val);

                    state = saveRuntimeSettings(state);
                    status.textContent = `Saved ${new Date().toLocaleTimeString()}`;
                });
            }
        }

        function renderAll() {
            renderTabs();
            renderPanels();
        }

        tabsRoot.addEventListener('click', (ev) => {
            const btn = ev.target.closest('button[data-tab]');
            if (!btn) return;
            activeTab = btn.dataset.tab;
            renderAll();
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            state = saveRuntimeSettings(state);
            status.textContent = `Saved ${new Date().toLocaleTimeString()}`;
            renderAll();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state = resetRuntimeSettings();
            status.textContent = 'Reset to defaults';
            renderAll();
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'aliens-runtime-settings.json';
            a.click();
            URL.revokeObjectURL(url);
            status.textContent = 'Exported JSON';
        });

        document.getElementById('importFile').addEventListener('change', async (ev) => {
            const file = ev.target.files && ev.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                state = saveRuntimeSettings(JSON.parse(text));
                status.textContent = 'Imported settings';
                renderAll();
            } catch {
                status.textContent = 'Import failed';
            }
        });

        renderAll();
        status.textContent = 'Loaded';
    </script>
</body>
</html>
