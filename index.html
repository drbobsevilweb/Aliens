<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIENS Redirect</title>
    <meta http-equiv="refresh" content="0; url=/game/">
    <script>
        const target = `/game/${window.location.search || ''}${window.location.hash || ''}`;
        window.location.replace(target);
    </script>
</head>
<body>
    <p>Redirecting to <a href="/game/">/game/</a>...</p>
</body>
</html>
